name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# ✅ Required permissions — fixes 403 error
permissions:
  contents: write      # Allow pushing to gh-pages branch
  pages: write         # Allow GitHub Pages deployment
  id-token: write      # Required for verification

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Match your local Node version
          cache: "yarn"      # Use yarn since you use yarn

      - name: Configure Yarn registry
        run: |
          yarn config set registry https://registry.npmjs.org/
          yarn config set network-timeout 120000

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true # Optional: keeps only latest build on gh-pages